<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manobras - Skate Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body {
            background-color: #1a1a1a;
        }

        .manobra-card {
            cursor: pointer;
            transition: transform .15s ease, box-shadow .15s ease;
        }

        .manobra-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .45);
        }

        .btn-favorito {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, .6);
            color: #fff;
            font-size: 1.3rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .15s ease, color .15s ease, transform .15s ease;
            z-index: 10;
        }

        .btn-favorito:hover {
            transform: scale(1.12);
        }

        .btn-favorito.favoritado {
            color: #ff4d6d;
            background: rgba(0, 0, 0, .75);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-md navbar-dark px-3 py-3" style="background-color: #1a1a1a;">
        <div class="container-fluid">

            <a href="index.html" class="navbar-brand fs-4 fw-bold d-flex align-items-center gap-2" style="text-decoration: none; color: white;">
                <img src="assets/img/logo-gato-grafismo.png"
                     alt="Logo Skate Hub"
                     width="100"
                     height="100"
                     class="d-inline-block align-text-top">
                <span>SKATE HUB</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <div class="d-flex flex-column flex-md-row gap-2 ms-auto mt-3 mt-md-0">
                    <a href="index.html" class="btn btn-light btn-sm fw-bold">HOME</a>
                    <a href="pegboard.html" class="btn btn-light btn-sm fw-bold">PAGEBOARD</a>
                    <a href="login.html" class="btn btn-light btn-sm fw-bold">LOGIN</a>
                </div>
            </div>

        </div>
    </nav>

    <main class="container mt-5 pt-3">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
            <h2 class="text-light fw-bold mb-0">Todas as Manobras</h2>
            <button id="btnNovaManobra" class="btn btn-light fw-bold">+ Nova Manobra</button>
        </div>

        <div class="row">

            <div class="col-12 col-md-3 mb-4">
                <div class="card p-4 text-light" style="background-color: #2a2a2a;">
                    <h4 class="text-center mb-4 text-warning fw-bold">Filtrar</h4>

                    <div class="mb-3">
                        <label class="form-label">Categoria:</label>
                        <select class="form-select" id="filtro-categoria">
                            <option value="Todos">Todos</option>
                            <option value="Iniciante">Iniciante</option>
                            <option value="Intermediário">Intermediário</option>
                            <option value="Avançado">Avançado</option>
                            <option value="Transição e Corrimão">Transição e Corrimão</option>
                        </select>
                    </div>

                    <div class="mb-1">
                        <label class="form-label">Buscar por nome:</label>
                        <input type="text" class="form-control" id="busca-manobra" placeholder="Ex: Kickflip">
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-9">
                <div class="row g-4 justify-content-start" id="grid-manobras"></div>
            </div>

        </div>
    </main>

    <footer class="text-light text-center p-4 mt-5" style="background-color: #333;">
        <p class="mb-0 fs-5">© 2026 Skate Hub - Criado por Iale Leles</p>
    </footer>

    <div class="modal fade" id="modalManobra" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-dark text-light border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalManobraTitulo">Adicionar Nova Manobra</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <form id="formManobra">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nome</label>
                                <input type="text" class="form-control" id="campoNome" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Categoria</label>
                                <select class="form-select" id="campoCategoria" required>
                                    <option value="Iniciante">Iniciante</option>
                                    <option value="Intermediário">Intermediário</option>
                                    <option value="Avançado">Avançado</option>
                                    <option value="Transição e Corrimão">Transição e Corrimão</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Descrição curta</label>
                                <input type="text" class="form-control" id="campoDescricaoCurta" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Descrição completa</label>
                                <textarea class="form-control" id="campoDescricaoCompleta" rows="3" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">URL da imagem</label>
                                <input type="url" class="form-control" id="campoImagem" placeholder="https://..." required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Dificuldade (1-5)</label>
                                <input type="number" min="1" max="5" class="form-control" id="campoDificuldade" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Destaque?</label>
                                <select class="form-select" id="campoDestaque">
                                    <option value="false">Não</option>
                                    <option value="true">Sim</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Base recomendada</label>
                                <input type="text" class="form-control" id="campoBase">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Tags (separadas por vírgula)</label>
                                <input type="text" class="form-control" id="campoTags" placeholder="flip, rua, classica">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Dica do mestre</label>
                                <input type="text" class="form-control" id="campoDica">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-warning fw-bold text-dark" id="btnSalvarManobra">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_URL = "http://localhost:3000/manobras";
        let todasAsManobras = [];
        let idManobraEditando = null;
        let bsModal = null;

        async function buscarManobras() {
            try {
                const resposta = await fetch(API_URL);
                if (!resposta.ok) throw new Error("Erro na requisição");
                todasAsManobras = await resposta.json();
                aplicarFiltros();
            } catch (error) {
                console.error("Erro ao carregar dados do JSON Server:", error);
                document.getElementById('grid-manobras').innerHTML = `
                    <div class="alert alert-danger w-100 text-center" role="alert">
                        Não foi possível carregar os dados. Certifique-se de que o JSON Server está ativo na porta 3001!
                    </div>`;
            }
        }

        function renderizarGrid(lista) {
            const grid = document.getElementById('grid-manobras');
            if (!grid) return;

            if (lista.length === 0) {
                grid.innerHTML = `<div class="col-12 text-center text-muted py-5">Nenhuma manobra encontrada.</div>`;
                return;
            }

            grid.innerHTML = lista.map(item => {
                const ehFavorito = item.favorito === true || item.favorito === "true";
                return `
                    <div class="col-12 col-sm-6 col-lg-4">
                        <div class="card h-100 bg-dark text-light border-secondary manobra-card position-relative" style="overflow: hidden;">
                            
                            <button class="btn-favorito ${ehFavorito ? 'favoritado' : ''}" 
                                    onclick="window.alternarFavorito(event, ${item.id}, ${ehFavorito})" 
                                    title="Favoritar">
                                &hearts;
                            </button>

                            <img src="${item.imagem}" alt="${item.nome}" class="card-img-top" style="height: 180px; object-fit: cover;">
                            
                            <div class="card-body d-flex flex-column justify-content-between">
                                <div>
                                    <h5 class="fw-bold mb-1 text-warning">${item.nome}</h5>
                                    <span class="badge bg-secondary mb-3">${item.categoria}</span>
                                    <p class="card-text small text-secondary" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">${item.descricaoCurta}</p>
                                </div>
                                
                                <div class="mt-3">
                                    <div class="d-flex gap-2 mb-2">
                                        <button class="btn btn-sm btn-outline-warning w-50 fw-bold" onclick="window.abrirEditar(${item.id})">Editar</button>
                                        <button class="btn btn-sm btn-outline-danger w-50 fw-bold" onclick="window.deletarManobra(${item.id})">Excluir</button>
                                    </div>
                                    <a href="detalhes.html?id=${item.id}" class="btn btn-light btn-sm w-100 fw-bold">Ver detalhes</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function aplicarFiltros() {
            const termoBusca = document.getElementById('busca-manobra').value.toLowerCase();
            const categoriaSel = document.getElementById('filtro-categoria').value;

            const filtradas = todasAsManobras.filter(m => {
                const bateNome = m.nome.toLowerCase().includes(termoBusca);
                const bateCategoria = (categoriaSel === 'Todos' || m.categoria === categoriaSel);
                return bateNome && bateCategoria;
            });

            renderizarGrid(filtradas);
        }

        function abrirCriar() {
            idManobraEditando = null;
            document.getElementById('formManobra').reset();
            document.getElementById('modalManobraTitulo').innerText = 'Adicionar Nova Manobra';
            bsModal.show();
        }

        function abrirEditar(id) {
            idManobraEditando = id;
            const manobra = todasAsManobras.find(m => m.id == id);
            if (!manobra) return;

            document.getElementById('modalManobraTitulo').innerText = 'Editar Manobra';
            document.getElementById('campoNome').value = manobra.nome;
            document.getElementById('campoCategoria').value = manobra.categoria;
            document.getElementById('campoDescricaoCurta').value = manobra.descricaoCurta;
            document.getElementById('campoDescricaoCompleta').value = manobra.descricaoCompleta;
            document.getElementById('campoImagem').value = manobra.imagem;
            document.getElementById('campoDificuldade').value = manobra.dificuldade_num || 1;
            document.getElementById('campoDestaque').value = String(manobra.destaque);
            document.getElementById('campoBase').value = manobra.base || '';
            document.getElementById('campoTags').value = manobra.tags ? manobra.tags.join(', ') : '';
            document.getElementById('campoDica').value = manobra.dica_mestre || '';

            bsModal.show();
        }

        async function salvarManobra() {
            const form = document.getElementById('formManobra');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            let statusFavoritoOriginal = false;
            if (idManobraEditando) {
                const correspondente = todasAsManobras.find(m => m.id == idManobraEditando);
                if (correspondente) statusFavoritoOriginal = correspondente.favorito || false;
            }

            const dadosCorpo = {
                nome: document.getElementById('campoNome').value,
                categoria: document.getElementById('campoCategoria').value,
                descricaoCurta: document.getElementById('campoDescricaoCurta').value,
                descricaoCompleta: document.getElementById('campoDescricaoCompleta').value,
                imagem: document.getElementById('campoImagem').value,
                dificuldade_num: parseInt(document.getElementById('campoDificuldade').value),
                destaque: document.getElementById('campoDestaque').value === 'true',
                base: document.getElementById('campoBase').value,
                tags: document.getElementById('campoTags').value.split(',').map(t => t.trim()).filter(t => t),
                dica_mestre: document.getElementById('campoDica').value,
                favorito: statusFavoritoOriginal
            };

            const urlFinal = idManobraEditando ? `${API_URL}/${idManobraEditando}` : API_URL;
            const metodoHTTP = idManobraEditando ? 'PUT' : 'POST';

            try {
                const resposta = await fetch(urlFinal, {
                    method: metodoHTTP,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosCorpo)
                });

                if (!resposta.ok) throw new Error("Erro ao salvar");
                
                bsModal.hide();
                await buscarManobras();
            } catch (error) {
                alert("Erro ao salvar manobra no servidor.");
                console.error(error);
            }
        }

        async function deletarManobra(id) {
            if (confirm("Deseja realmente excluir esta manobra do banco de dados?")) {
                try {
                    const resposta = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if (!resposta.ok) throw new Error("Erro ao deletar");
                    await buscarManobras();
                } catch (error) {
                    alert("Não foi possível excluir a manobra.");
                    console.error(error);
                }
            }
        }

        async function alternarFavorito(e, id, estadoAtual) {
            if (e) e.stopPropagation();
            
            try {
                const resposta = await fetch(`${API_URL}/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ favorito: !estadoAtual })
                });

                if (!resposta.ok) throw new Error("Erro ao atualizar favorito");
                await buscarManobras();
            } catch (error) {
                console.error("Erro ao favoritar:", error);
            }
        }

        window.alternarFavorito = alternarFavorito;
        window.abrirEditar = abrirEditar;
        window.deletarManobra = deletarManobra;

        document.addEventListener("DOMContentLoaded", () => {
            const modalElemento = document.getElementById('modalManobra');
            if (modalElemento) {
                bsModal = new bootstrap.Modal(modalElemento);
            }

            document.getElementById('busca-manobra')?.addEventListener('input', aplicarFiltros);
            document.getElementById('filtro-categoria')?.addEventListener('change', aplicarFiltros);
            document.getElementById('btnNovaManobra')?.addEventListener('click', abrirCriar);
            document.getElementById('btnSalvarManobra')?.addEventListener('click', salvarManobra);

            buscarManobras();
        });
    </script>
</body>
</html>
