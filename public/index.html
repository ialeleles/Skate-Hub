<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Skate Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    
    <nav class="navbar navbar-expand-md navbar-dark px-3 py-3" style="background-color: #1a1a1a;">
        <div class="container-fluid">
    
            <a href="index.html" class="navbar-brand fs-4 fw-bold d-flex align-items-center gap-2" style="text-decoration: none; color: white;">
                <img src="assets/img/logo-gato-grafismo.png" 
                     alt="Logo Skate Hub" 
                     width="100" 
                     height="100"
                     class="d-inline-block align-text-top">
                <span>SKATE HUB</span>
            </a>
    
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="menu">
                <div class="d-flex flex-column flex-md-row gap-2 ms-auto mt-3 mt-md-0">
                    <a href="manobras.html" class="btn btn-light btn-sm fw-bold">MANOBRAS</a>
                    <a href="pegboard.html" class="btn btn-light btn-sm fw-bold">PAGEBOARD</a>
                    <a href="login.html" class="btn btn-light btn-sm fw-bold">LOGIN</a>
                </div>
            </div>

        </div>
    </nav>

<main>
    <section class="background">
        <img src="https://images.unsplash.com/photo-1602878714398-b28d40926846?q=80&w=1471&auto=format&fit=crop&ixlib=rb-4.1.0" alt="imagem de fundo de uma pessoa andando de skate" class="background-img">
    
        <div class="título-background">
            <h2>Domine o skate</h2>
        </div>
    
        <div class="conteúdo-background">
            <h3>Aprenda manobras e evolua mais rápido!</h3>
        </div>
    </section>
    
    <div class="container">
        <h3 class="titulo-secao">Manobras em Destaque</h3>
        
        <div id="carouselDestaques" class="carousel slide" data-bs-ride="carousel" data-bs-interval="5000">
            <div class="carousel-indicators" id="carrossel-indicadores"></div>
    
            <div class="carousel-inner" id="carrossel-itens"></div>
    
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselDestaques" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselDestaques" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
            
        </div>
    </div>
    
    <div class="texto-conteudo">Comece por aqui</div>
    
    <div class="container mt-5">
        <div class="row">
    
            <div class="col-12 col-md-3 mb-4">
                <div class="card p-4 text-light" style="background-color: #2a2a2a;">
                    <h4 class="text-center mb-4">Filtrar</h4>
    
                    <div class="mb-3">
                        <label class="form-label">Categoria:</label>
                        <select class="form-select" id="filtro-categoria">
                            <option value="Todos">Todos</option>
                            <option value="Iniciante">Iniciante</option>
                            <option value="Intermediário">Intermediário</option>
                            <option value="Avançado">Avançado</option>
                            <option value="Transição e Corrimão">Transição e Corrimão</option>
                        </select>
                    </div>
                </div>
            </div>
    
            <div class="col-12 col-md-9">
                <div class="row g-4 justify-content-center" id="container-manobras"></div>
    
                <div id="detalhe-manobra"></div>
            </div>
    
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/scripts/app.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 1. BANCO DE DADOS EMUTIDO
    const manobras = [
        {
            "id": 1,
            "nome": "Ollie",
            "categoria": "Iniciante",
            "descricaoCurta": "O salto básico e fundamental do skate.",
            "imagem": "https://images.unsplash.com/photo-1617034840325-b10d81550042?q=80&w=1470",
            "destaque": true
        },
        {
            "id": 2,
            "nome": "Kickflip",
            "categoria": "Intermediário",
            "descricaoCurta": "O skate gira 360 graus no ar.",
            "imagem": "https://images.unsplash.com/photo-1573054022697-3af201441528?w=600",
            "destaque": true
        },
        {
            "id": 3,
            "nome": "Heelflip",
            "categoria": "Intermediário",
            "descricaoCurta": "Similar ao Kickflip, mas girado com o calcanhar.",
            "imagem": "https://images.unsplash.com/photo-1649281610716-94e4ee026d91?q=80&w=1470",
            "destaque": false
        }
    ];

    // 2. FUNÇÃO PARA CARREGAR O CARROSSEL
    function carregarCarrossel() {
        const containerCarrossel = document.getElementById('carrossel-itens');
        const containerIndicadores = document.getElementById('carrossel-indicadores');

        if (!containerCarrossel || !containerIndicadores) return;

        const itensDestaque = manobras.filter(m => m.destaque);
        let htmlCarrossel = '';
        let htmlIndicadores = '';

        itensDestaque.forEach((item, index) => {
            const activeClass = index === 0 ? 'active' : '';

            htmlCarrossel += `
                <div class="carousel-item ${activeClass}">
                    <img src="${item.imagem}" class="d-block w-100" alt="${item.nome}" style="height: 400px; object-fit: cover;">
                    <div class="carousel-caption">
                        <div class="bg-dark bg-opacity-75 p-3 rounded">
                            <h2 class="fw-bold text-white text-uppercase mb-1">${item.nome}</h2>
                            <p class="text-light mb-3">${item.descricaoCurta}</p>
                            <a href="detalhes.html?id=${item.id}" class="btn btn-light btn-sm fw-bold px-3">Ver detalhes</a>
                        </div>
                    </div>
                </div>
            `;

            htmlIndicadores += `
                <button type="button" data-bs-target="#carouselDestaques" data-bs-slide-to="${index}" class="${activeClass}" aria-current="${index === 0 ? 'true' : 'false'}" aria-label="Slide ${index + 1}"></button>
            `;
        });

        containerCarrossel.innerHTML = htmlCarrossel;
        containerIndicadores.innerHTML = htmlIndicadores;
    }

    // 3. FUNÇÃO PARA RENDERIZAR OS CARDS
    function renderizarCards(lista) {
        const container = document.getElementById('container-manobras');
        if (!container) return;

        container.innerHTML = lista.map(item => `
            <div class="col-12 col-sm-6 col-lg-4 d-flex justify-content-center">
                <div class="card h-100 w-100 bg-dark text-light border-secondary">
                    <img src="${item.imagem}" alt="${item.nome}" class="card-img-top" style="height: 200px; object-fit: cover;">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <h5 class="fw-bold mb-2">${item.nome}</h5>
                            <span class="badge bg-secondary mb-3">${item.categoria}</span>
                            <p class="card-text small text-secondary">${item.descricaoCurta}</p>
                        </div>
                        <a href="detalhes.html?id=${item.id}" class="btn btn-outline-light btn-sm w-100 mt-2">Ver detalhes</a>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // 4. FILTRO DE CATEGORIAS
    document.getElementById('filtro-categoria')?.addEventListener('change', (e) => {
        const categoriaSelecionada = e.target.value;
        if (categoriaSelecionada === 'Todos') {
            renderizarCards(manobras);
        } else {
            const filtradas = manobras.filter(m => m.categoria === categoriaSelecionada);
            renderizarCards(filtradas);
        }
    });

    // EXECUÇÃO IMEDIATA ASSIM QUE A PÁGINA ABRE
    document.addEventListener("DOMContentLoaded", () => {
        carregarCarrossel();
        renderizarCards(manobras);

        // Inicializa o carrossel do Bootstrap manualmente
        const elementoCarrossel = document.getElementById('carouselDestaques');
        if (elementoCarrossel) {
            new bootstrap.Carousel(elementoCarrossel, {
                ride: true,
                interval: 4000
            });
        }
    });
</script>
</body>
</html>
