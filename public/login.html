<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skate Hub - Login e Cadastro (JSON Server)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body {
            background-color: #1a1a1a;
        }
        .card-login {
            background-color: #2a2a2a;
            border: 1px solid #3d3d3d;
            border-radius: 10px;
        }
        .nav-tabs .nav-link {
            color: #aaa;
            border: none;
        }
        .nav-tabs .nav-link.active {
            background-color: transparent;
            color: #ffc107;
            border-bottom: 3px solid #ffc107;
            font-weight: bold;
        }
        .nav-tabs .nav-link:hover {
            color: #fff;
            border-color: transparent;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-md navbar-dark px-3 py-3" style="background-color: #1a1a1a;">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand fs-4 fw-bold d-flex align-items-center gap-2" style="text-decoration: none; color: white;">
                <img src="assets/img/logo-gato-grafismo.png"
                     alt="Logo Skate Hub"
                     width="100"
                     height="100"
                     class="d-inline-block align-text-top">
                <span>SKATE HUB</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <div class="d-flex flex-column flex-md-row gap-2 ms-auto mt-3 mt-md-0">
                    <a href="index.html" class="btn btn-light btn-sm fw-bold">HOME</a>
                    <a href="pegboard.html" class="btn btn-light btn-sm fw-bold">PAGEBOARD</a>
                    <a href="login.html" class="btn btn-light btn-sm fw-bold active">LOGIN</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-5">
                <div class="card-login p-4 text-light shadow-lg">
                    
                    <ul class="nav nav-tabs justify-content-center mb-4 border-secondary" id="tabAcesso" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active text-uppercase" id="login-tab" data-bs-toggle="tab" data-bs-target="#aba-login" type="button" role="tab">Entrar</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link text-uppercase" id="cadastro-tab" data-bs-toggle="tab" data-bs-target="#aba-cadastro" type="button" role="tab">Cadastrar</button>
                        </li>
                    </ul>

                    <div class="alert alert-danger d-none" id="erro-mensagem" role="alert"></div>
                    <div class="alert alert-success d-none" id="sucesso-mensagem" role="alert"></div>

                    <div class="tab-content" id="conteudoTabAcesso">
                        
                        <div class="tab-pane fade show active" id="aba-login" role="tabpanel" aria-labelledby="login-tab">
                            <h4 class="text-center fw-bold mb-3 text-warning">ÁREA DO SKATISTA</h4>
                            <form id="formLogin">
                                <div class="mb-3">
                                    <label for="email" class="form-label">E-mail ou Usuário</label>
                                    <input type="text" class="form-control bg-dark text-light border-secondary" id="email" required placeholder="admin">
                                </div>
                                <div class="mb-4">
                                    <label for="senha" class="form-label">Senha</label>
                                    <input type="password" class="form-control bg-dark text-light border-secondary" id="senha" required placeholder="******">
                                </div>
                                <button type="submit" class="btn btn-light w-100 fw-bold py-2 mb-3">ENTRAR</button>
                            </form>
                            <div class="text-center">
                                <small class="text-muted">Padrão de teste: <strong>admin</strong> | Senha: <strong>1234</strong></small>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="aba-cadastro" role="tabpanel" aria-labelledby="cadastro-tab">
                            <h4 class="text-center fw-bold mb-3 text-warning">CRIE SUA CONTA</h4>
                            <form id="formCadastro">
                                <div class="mb-3">
                                    <label for="cadUsuario" class="form-label">Nome de Usuário</label>
                                    <input type="text" class="form-control bg-dark text-light border-secondary" id="cadUsuario" required placeholder="ex: skate_pro">
                                </div>
                                <div class="mb-3">
                                    <label for="cadEmail" class="form-label">E-mail</label>
                                    <input type="email" class="form-control bg-dark text-light border-secondary" id="cadEmail" required placeholder="nome@provedor.com">
                                </div>
                                <div class="mb-4">
                                    <label for="cadSenha" class="form-label">Senha</label>
                                    <input type="password" class="form-control bg-dark text-light border-secondary" id="cadSenha" required placeholder="Mínimo 4 caracteres">
                                </div>
                                <button type="submit" class="btn btn-warning w-100 fw-bold text-dark py-2">FINALIZAR CADASTRO</button>
                            </form>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer class="text-light text-center p-4 mt-5" style="background-color: #333;">
        <p class="mb-0 fs-5">© 2026 Skate Hub - Criado por Iale Leles</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
    const formLogin = document.getElementById("formLogin");
    const formCadastro = document.getElementById("formCadastro");
    const erroAlerta = document.getElementById("erro-mensagem");
    const sucessoAlerta = document.getElementById("sucesso-mensagem");

    const API_URL = "http://localhost:3000/usuarios";

    function exibirAlerta(elemento, mensagem) {
        erroAlerta.classList.add("d-none");
        sucessoAlerta.classList.add("d-none");
        elemento.textContent = mensagem;
        elemento.classList.remove("d-none");
    }

    formCadastro.addEventListener("submit", async (e) => {
        e.preventDefault();

        const novoUsuario = document.getElementById("cadUsuario").value.trim().toLowerCase();
        const novoEmail = document.getElementById("cadEmail").value.trim().toLowerCase();
        const novaSenha = document.getElementById("cadSenha").value;

        if (novaSenha.length < 3) {
            exibirAlerta(erroAlerta, "A senha deve conter pelo menos 3 caracteres!");
            return;
        }

        try {
            const respostaGet = await fetch(API_URL);
            const usuarios = await respostaGet.json();

            const usuarioExiste = usuarios.some(u => u.login === novoUsuario || u.email === novoEmail);

            if (usuarioExiste) {
                exibirAlerta(erroAlerta, "Este nome de usuário ou e-mail já está cadastrado!");
                return;
            }

            const respostaPost = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    login: novoUsuario,
                    senha: novaSenha,
                    nome: novoUsuario,
                    email: novoEmail,
                    admin: false
                })
            });

            if (respostaPost.ok) {
                exibirAlerta(sucessoAlerta, "Conta criada com sucesso! Mude para a aba 'Entrar' para logar.");
                formCadastro.reset();
            } else {
                exibirAlerta(erroAlerta, "Falha ao registrar dados no servidor.");
            }

        } catch (error) {
            exibirAlerta(erroAlerta, "Erro ao conectar com o JSON Server.");
        }
    });

    formLogin.addEventListener("submit", async (e) => {
        e.preventDefault();

        const loginDigitado = formLogin.querySelector("#email").value.trim().toLowerCase();
        const senhaDigitada = formLogin.querySelector("#senha").value;

        try {
            const resposta = await fetch(API_URL);
            const usuarios = await resposta.json();
            const contaEncontrada = usuarios.find(u => 
                (u.login === loginDigitado || u.email === loginDigitado) && 
                String(u.senha) === String(senhaDigitada)
            );

            if (contaEncontrada) {
                localStorage.setItem("usuario_logado", "true");
                localStorage.setItem("nome_sessao", contaEncontrada.login);
                
                alert(`Bem-vindo de volta, ${contaEncontrada.login}!`);
                window.location.href = "index.html";
            } else {
                exibirAlerta(erroAlerta, "Usuário, e-mail ou senha incorretos!");
            }

        } catch (error) {
            console.error("Erro no Login:", error);
            exibirAlerta(erroAlerta, "Erro ao conectar com o JSON Server. Verifique o terminal.");
        }
    });
});
    </script>
</body>
</html>
