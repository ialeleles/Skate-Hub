<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skate Hub - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body {
            background-color: #1a1a1a;
        }
        .card-login {
            background-color: #2a2a2a;
            border: 1px solid #3d3d3d;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-md navbar-dark px-3 py-3" style="background-color: #1a1a1a;">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand fs-4 fw-bold d-flex align-items-center gap-2" style="text-decoration: none; color: white;">
                <img src="assets/img/logo-gato-grafismo.png"
                     alt="Logo Skate Hub"
                     width="100"
                     height="100"
                     class="d-inline-block align-text-top">
                <span>SKATE HUB</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu" aria-controls="menu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <div class="d-flex flex-column flex-md-row gap-2 ms-auto mt-3 mt-md-0">
                    <a href="index.html" class="btn btn-light btn-sm fw-bold">HOME</a>
                    <a href="pegboard.html" class="btn btn-light btn-sm fw-bold">PAGEBOARD</a>
                    <a href="login.html" class="btn btn-light btn-sm fw-bold active">LOGIN</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-5">
                <div class="card-login p-4 text-light shadow-lg">
                    <h3 class="text-center fw-bold mb-4 text-warning">ÁREA DO SKATISTA</h3>
                    
                    <div class="alert alert-danger d-none" id="erro-login" role="alert">
                        Usuário ou senha incorretos!
                    </div>

                    <form id="formLogin">
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail ou Usuário</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="email" required placeholder="skate@hub.com">
                        </div>
                        <div class="mb-4">
                            <label for="senha" class="form-label">Senha</label>
                            <input type="password" class="form-control bg-dark text-light border-secondary" id="senha" required placeholder="******">
                        </div>
                        
                        <button type="submit" class="btn btn-light w-100 fw-bold py-2 mb-3">ENTRAR</button>
                    </form>

                    <div class="text-center">
                        <small class="text-muted">Usuário de teste: <strong>admin</strong> | Senha: <strong>1234</strong></small>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-light text-center p-4 mt-5" style="background-color: #333;">
        <p class="mb-0 fs-5">© 2026 Skate Hub - Criado por Iale Leles</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("formLogin");
            const erroAlerta = document.getElementById("erro-login");

            form.addEventListener("submit", (e) => {
                e.preventDefault(); // Impede a página de recarregar

                const usuarioDigitado = document.getElementById("email").value;
                const senhaDigitada = document.getElementById("senha").value;

                // Credenciais de teste simuladas
                const USUARIO_CORRETO = "admin";
                const SENHA_CORRETA = "1234";

                if (usuarioDigitado === USUARIO_CORRETO && senhaDigitada === SENHA_CORRETA) {
                    // Oculta o erro se ele estiver visível
                    erroAlerta.classList.add("d-none");

                    // Salva que o usuário logou com sucesso
                    localStorage.setItem("usuario_logado", "true");

                    alert("Login realizado com sucesso! Bem-vindo de volta.");
                    
                    // Redireciona para a Home (index.html) através do Live Server
                    window.location.href = "index.html";
                } else {
                    // Mostra o alerta de erro do Bootstrap
                    erroAlerta.classList.remove("d-none");
                }
            });
        });
    </script>
</body>
</html>
