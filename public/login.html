<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Skate Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body style="background-color: #1a1a1a">

    <nav class="navbar navbar-dark px-2" style="background-color: #1a1a1a;">
    <div class="container-fluid d-flex justify-content-center align-items-center">

        <a href="index.html" class="navbar-brand fs-3 fs-md-1 fw-bold p-2 d-flex align-items-center" style="text-decoration: none; color: white;">
            <img src="assets/img/logo-gato-grafismo.png" 
                 alt="Logo Skate Hub" 
                 width="120" 
                 height="120"
                 class="me-2"> <span>SKATE HUB</span>
        </a>
        
    </div>
</nav>

<form id="formLogin" class="container mt-5 text-light" style="max-width: 400px;">
    <h3 class="mb-3">Login</h3>
    <div class="mb-3">
        <label class="form-label">Usuário</label>
        <input type="text" id="loginUsuario" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" id="senhaUsuario" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-danger w-100 mt-2 fw-bold">Entrar</button>
    <a href="#" id="btnIrParaCadastro" class="btn btn-outline-light w-100 mt-2">Não tem conta? Junte-se a nós</a>
</form>

<form id="formCadastro" class="container mt-5 text-light d-none" style="max-width: 400px; margin-bottom: 100px;">
    <h3 class="mb-3">Criar Nova Conta</h3>
    <div class="mb-3">
        <label class="form-label">Nome Completo</label>
        <input type="text" id="cadNome" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" id="cadEmail" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Escolha um Usuário</label>
        <input type="text" id="cadLogin" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Escolha uma Senha</label>
        <input type="password" id="cadSenha" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-warning w-100 mt-2 fw-bold">Cadastrar</button>
    <a href="#" id="btnIrParaLogin" class="btn btn-outline-light w-100 mt-2">Já tem conta? Faça o Login</a>
</form>

<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
    <div id="toastMensagem" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div id="toastCorpo" class="toast-body fw-bold">
                </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/scripts/login.js"></script>
</body>
</html>
