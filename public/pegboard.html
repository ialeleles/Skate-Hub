<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pegboard - Skate Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body style="background-color: #1a1a1a;">
<nav class="navbar navbar-dark px-2" style="background-color: #1a1a1a;">
    <div class="container-fluid d-flex align-items-center">
        <a href="index.html" class="navbar-brand fs-3 fw-bold p-2 d-flex align-items-center" style="text-decoration:none; color:white;">
            <img src="assets/img/logo-gato-grafismo.png" alt="Logo Skate Hub" width="120" height="120" class="me-2">
            <span>SKATE HUB</span>
        </a>
    </div>
</nav>

<div class="container-fluid mt-1 px-4 text-light">
    <h2 class="fw-bold text-center mb-4">Monte seu Pegboard de Equipamentos</h2>
    
    <div class="d-flex justify-content-center gap-2 mb-4 flex-wrap">
        <button class="btn btn-danger btn-filtro active" data-categoria="todos">Todos</button>
        <button class="btn btn-outline-light btn-filtro" data-categoria="shape">Shapes</button>
        <button class="btn btn-outline-light btn-filtro" data-categoria="rolamento">Rolamentos</button>
        <button class="btn btn-outline-light btn-filtro" data-categoria="truck">Trucks</button>
        <button class="btn btn-outline-light btn-filtro" data-categoria="rodas">Rodas</button>
        <button class="btn btn-warning fw-bold" data-bs-toggle="modal" data-bs-target="#modalNovoEquipamento">+ Criar Equipamento</button>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-7">
            <div id="pegboard-container" class="position-relative border border-secondary rounded p-3" 
                 style="height: 550px; max-height: 550px; overflow: auto; background-color: #2b2b2b;"></div>
            <button id="btnLimparPainel" class="btn btn-outline-danger w-100 mt-2 fw-bold">Limpar Painel</button>
        </div>

        <div class="col-5">
            <h5 class="fw-bold mb-2">Equipamentos Disponíveis</h5>
            <div id="catalogo-wrapper" class="d-flex flex-wrap gap-2 p-3 bg-dark rounded border border-secondary" 
                 style="height: 550px; max-height: 550px; overflow-y: auto;"></div>
        </div>
    </div>
</div>

<div class="modal fade text-dark" id="modalNovoEquipamento" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Adicionar Meu Equipamento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="formNovoEquipamento">
                    <div class="mb-3">
                        <label class="form-label">Nome do Equipamento</label>
                        <input type="text" id="novoNome" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Categoria</label>
                        <select id="novaCategoria" class="form-select">
                            <option value="shape">Shape</option>
                            <option value="truck">Truck</option>
                            <option value="rolamento">Rolamento</option>
                            <option value="rodas">Rodas</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Caminho ou Link da Imagem</label>
                        <input type="text" id="novaImg" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold">Salvar no Banco</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/scripts/itens.js"></script>
</body>
</html>
